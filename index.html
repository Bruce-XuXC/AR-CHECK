<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>AR视觉检测 - AR Visual Inspection</title>
    <script async src="https://docs.opencv.org/4.7.0/opencv.js" onload="onOpenCVReady()"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a; color: #fff;
            overflow: hidden; height: 100vh; width: 100vw;
            touch-action: none;
        }

        /* 启动页 */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; transition: opacity 0.6s;
            padding: 20px;
        }
        #splash h1 { font-size: 26px; margin-bottom: 8px; letter-spacing: 3px; font-weight: 700; }
        #splash .subtitle { color: #a0a0c0; font-size: 13px; margin-bottom: 8px; }
        #splash .version { color: #667eea; font-size: 11px; margin-bottom: 30px; letter-spacing: 1px; }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none; color: white; padding: 18px 56px;
            border-radius: 30px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
            letter-spacing: 1px; min-width: 260px; text-align: center;
            margin-bottom: 12px;
        }
        .btn:active { transform: scale(0.95); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn.sim {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            box-shadow: none; font-size: 14px; padding: 14px 40px; min-width: 260px;
        }
        .btn.hint {
            background: rgba(0,200,100,0.2); border: 1px solid rgba(0,200,100,0.3);
            box-shadow: none; font-size: 13px; padding: 12px 24px; min-width: 260px;
            color: #00ff88;
        }

        .loader {
            width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #667eea; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #main { display: none; position: relative; width: 100%; height: 100%; }

        #videoContainer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000;
        }
        #video { width: 100%; height: 100%; object-fit: cover; }

        #processCanvas { display: none; }

        #arCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }

        #topBar {
            position: absolute; top: 0; left: 0; right: 0;
            padding: 12px 16px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
            z-index: 20; display: flex; justify-content: space-between; align-items: flex-start;
        }
        #statusBadge {
            padding: 6px 14px; border-radius: 14px; font-size: 12px; font-weight: 600;
            display: flex; align-items: center; gap: 6px; transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        #statusBadge.init { background: rgba(100,100,100,0.3); color: #aaa; border: 1px solid rgba(100,100,100,0.5); }
        #statusBadge.tracking { background: rgba(0, 200, 100, 0.25); color: #00ff88; border: 1px solid rgba(0, 200, 100, 0.4); }
        #statusBadge.lost { background: rgba(255, 100, 0, 0.25); color: #ff8800; border: 1px solid rgba(255, 100, 0, 0.4); }
        #statusBadge.sim { background: rgba(255, 170, 0, 0.2); color: #ffa502; border: 1px solid rgba(255, 170, 0, 0.4); }

        #matchInfo { text-align: right; }
        #matchInfo .fps { color: #8892b0; font-size: 11px; }
        #matchInfo .matches { color: #00ff88; font-size: 11px; margin-top: 2px; }

        #templateGuide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 25; display: none; flex-direction: column;
            align-items: center; justify-content: center; pointer-events: none;
        }
        #templateGuide.show { display: flex; }
        .guide-frame {
            width: 260px; height: 200px; border: 3px solid rgba(102, 126, 234, 0.8);
            border-radius: 16px; position: relative;
            box-shadow: 0 0 40px rgba(102, 126, 234, 0.3), inset 0 0 40px rgba(102, 126, 234, 0.1);
        }
        .guide-frame::before, .guide-frame::after {
            content: ''; position: absolute; width: 24px; height: 24px;
            border: 4px solid #667eea;
        }
        .guide-frame::before { top: -4px; left: -4px; border-right: none; border-bottom: none; border-radius: 12px 0 0 0; }
        .guide-frame::after { bottom: -4px; right: -4px; border-left: none; border-top: none; border-radius: 0 0 12px 0; }
        .guide-text {
            margin-top: 24px; text-align: center;
            background: rgba(0,0,0,0.7); padding: 12px 24px; border-radius: 12px;
            backdrop-filter: blur(10px);
        }
        .guide-text h3 { font-size: 16px; margin-bottom: 6px; }
        .guide-text p { font-size: 13px; color: #a0a0c0; }

        #bottomBar {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 16px 16px 32px;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
            z-index: 20; display: flex; justify-content: center; gap: 16px;
        }
        .control-btn {
            width: 56px; height: 56px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.08);
            color: white; display: flex; align-items: center; justify-content: center;
            font-size: 22px; cursor: pointer; transition: all 0.2s;
            backdrop-filter: blur(10px);
        }
        .control-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.15); }
        .control-btn.primary {
            width: 64px; height: 64px; margin-top: -4px;
            background: linear-gradient(135deg, #ff4757 0%, #ff6348 100%);
            border: 3px solid rgba(255,255,255,0.3);
            box-shadow: 0 4px 20px rgba(255, 71, 87, 0.4);
            font-size: 26px;
        }
        .control-btn.active { background: rgba(0, 200, 100, 0.2); border-color: rgba(0, 200, 100, 0.5); }

        #reportPanel {
            position: absolute; top: 60px; right: 12px; width: 190px;
            background: rgba(15, 15, 25, 0.95); border-radius: 16px;
            padding: 16px; z-index: 30; display: none;
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        #reportPanel.show { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        #reportPanel h3 { font-size: 13px; color: #667eea; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .report-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .report-item:last-child { border-bottom: none; }
        .report-item .label { font-size: 11px; color: #8892b0; }
        .report-item .value { font-size: 12px; font-weight: 600; }
        .value.ok { color: #00ff88; }
        .value.nok { color: #ff4757; }
        .value.warn { color: #ffa502; }

        #featureOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 15; display: none;
        }
        #featureOverlay.show { display: block; }

        #photoPreview {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); z-index: 50; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        #photoPreview.show { display: flex; }
        #previewImg { max-width: 90%; max-height: 65%; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .photo-actions { display: flex; gap: 16px; margin-top: 20px; }
        .photo-btn {
            padding: 14px 36px; border-radius: 24px; border: none;
            font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .photo-btn.save { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .photo-btn.close { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }

        #toast {
            position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
            background: rgba(15, 15, 25, 0.95); color: white; padding: 12px 28px;
            border-radius: 24px; font-size: 13px; z-index: 100;
            display: none; backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        #toast.show { display: block; animation: fadeIn 0.3s ease; }

        #qualityBar {
            position: absolute; top: 50px; left: 16px; right: 16px;
            height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px;
            z-index: 20; overflow: hidden; display: none;
        }
        #qualityBar.show { display: block; }
        #qualityFill {
            height: 100%; width: 0%; border-radius: 2px;
            transition: width 0.3s, background 0.3s;
        }
        #qualityFill.good { background: #00ff88; }
        #qualityFill.medium { background: #ffa502; }
        #qualityFill.poor { background: #ff4757; }

        #simBadge {
            position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 170, 0, 0.2); color: #ffa502;
            padding: 6px 16px; border-radius: 12px; font-size: 11px;
            z-index: 20; display: none; border: 1px solid rgba(255, 170, 0, 0.3);
        }
        #simBadge.show { display: block; }

        /* 摄像头切换按钮 */
        #cameraSwitch {
            position: absolute; top: 60px; right: 16px;
            width: 40px; height: 40px; border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5);
            color: white; display: flex; align-items: center; justify-content: center;
            font-size: 18px; cursor: pointer; z-index: 20;
            backdrop-filter: blur(10px);
        }
        #cameraSwitch:active { transform: scale(0.9); }
        #cameraSwitch { display: none; }
    </style>
</head>
<body>
    <div id="splash">
        <h1>🔍 AR视觉检测</h1>
        <p class="subtitle">基于 OpenCV.js 真实视觉追踪</p>
        <p class="version">v3.0 - 安卓优化版</p>

        <div id="cvLoading" style="display:none;flex-direction:column;align-items:center;margin-bottom:20px;">
            <div class="loader"></div>
            <p style="color:#a0a0c0;font-size:13px;">正在加载 OpenCV.js...</p>
        </div>

        <button class="btn" id="startBtn" onclick="startApp()" disabled>📷 启动摄像头检测</button>
        <button class="btn sim" id="simBtn" onclick="startSimMode()">🎮 模拟模式（无摄像头）</button>

        <p style="margin-top:20px;font-size:11px;color:#555;text-align:center;line-height:1.6;">
            💡 提示：如果在APP内打开，请用系统浏览器访问<br>
            或将文件部署到HTTPS服务器后访问
        </p>
    </div>

    <div id="main">
        <div id="videoContainer">
            <video id="video" autoplay playsinline muted></video>
        </div>
        <canvas id="processCanvas"></canvas>
        <canvas id="arCanvas"></canvas>
        <canvas id="featureOverlay"></canvas>

        <div id="cameraSwitch" onclick="switchCamera()">🔄</div>

        <div id="qualityBar"><div id="qualityFill"></div></div>
        <div id="simBadge">🎮 模拟模式 - 单指拖动 · 双指缩放旋转</div>

        <div id="topBar">
            <div id="statusBadge" class="init"><span>●</span> 等待模板</div>
            <div id="matchInfo">
                <div class="fps" id="fpsDisplay">-- FPS</div>
                <div class="matches" id="matchCount">匹配点: 0</div>
            </div>
        </div>

        <div id="templateGuide">
            <div class="guide-frame"></div>
            <div class="guide-text">
                <h3 id="guideTitle">📸 捕获模板</h3>
                <p id="guideText">将零件放入框内，保持稳定<br>点击下方红色按钮捕获</p>
            </div>
        </div>

        <div id="reportPanel">
            <h3>📊 检测数据</h3>
            <div class="report-item"><span class="label">追踪状态</span><span class="value ok" id="rStatus">等待模板</span></div>
            <div class="report-item"><span class="label">匹配特征数</span><span class="value ok" id="rMatches">0</span></div>
            <div class="report-item"><span class="label">追踪质量</span><span class="value ok" id="rQuality">--</span></div>
            <div class="report-item"><span class="label">水平偏移</span><span class="value ok" id="rX">--</span></div>
            <div class="report-item"><span class="label">垂直偏移</span><span class="value ok" id="rY">--</span></div>
            <div class="report-item"><span class="label">缩放比例</span><span class="value ok" id="rScale">--</span></div>
            <div class="report-item"><span class="label">旋转角度</span><span class="value ok" id="rAngle">--</span></div>
            <div class="report-item"><span class="label">综合判定</span><span class="value ok" id="rResult">--</span></div>
        </div>

        <div id="bottomBar">
            <div class="control-btn" onclick="toggleFeatures()" id="featBtn">🔬</div>
            <div class="control-btn" onclick="captureTemplate()" id="templateBtn">📸</div>
            <div class="control-btn primary" onclick="capturePhoto()">📷</div>
            <div class="control-btn" onclick="toggleReport()">📊</div>
            <div class="control-btn" onclick="resetTracking()">🔄</div>
        </div>

        <div id="photoPreview">
            <img id="previewImg" src="" alt="检测照片">
            <div class="photo-actions">
                <button class="photo-btn save" onclick="savePhoto()">保存报告</button>
                <button class="photo-btn close" onclick="closePreview()">关闭</button>
            </div>
        </div>

        <div id="toast"></div>
    </div>

<script>
// ==================== 全局状态 ====================
let video, canvas, ctx, processCanvas, pCtx, featureCanvas, fCtx;
let stream = null;
let cvReady = false;
let isTracking = false;
let showFeatures = false;
let animationId = null;
let frameCount = 0;
let lastTime = performance.now();
let isSimMode = false;
let useFrontCamera = false; // 摄像头切换

let cv = null;
let templateKeypoints = null;
let templateDescriptors = null;
let orb = null;
let bfMatcher = null;
let homographyMatrix = null;
let templateCorners = null;
let templateImage = null;

let trackState = 'init';
let matchQuality = 0;
let currentTransform = { x: 0, y: 0, scale: 1, angle: 0 };

// 模拟模式手势状态
let simModelOffset = { x: 0, y: 0 };
let simModelScale = 1;
let simModelAngle = 0;
let lastTouch = null;
let lastPinchDist = 0;
let lastPinchAngle = 0;

const modelConfig = {
    width: 200, height: 150, depth: 50,
    tolerance: 0.5, color: '#00ff88', name: '标准矩形零件'
};

function onOpenCVReady() {
    cv = window.cv;
    cvReady = true;
    document.getElementById('startBtn').disabled = false;
    document.getElementById('cvLoading').style.display = 'none';
    console.log('OpenCV.js ready');
}

// ==================== 摄像头切换 ====================
async function switchCamera() {
    if (!stream) return;
    useFrontCamera = !useFrontCamera;

    // 停止当前流
    stream.getTracks().forEach(track => track.stop());

    try {
        const constraints = {
            video: {
                facingMode: useFrontCamera ? 'user' : 'environment',
                width: { ideal: 1280 },
                height: { ideal: 720 }
            }
        };
        stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
        await video.play();
        showToast(useFrontCamera ? '已切换到前置摄像头' : '已切换到后置摄像头');
    } catch (err) {
        showToast('切换摄像头失败: ' + err.message);
    }
}

// ==================== 模拟模式启动 ====================
function startSimMode() {
    isSimMode = true;
    document.getElementById('splash').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('splash').style.display = 'none';
        document.getElementById('main').style.display = 'block';
        document.getElementById('simBadge').classList.add('show');
        document.getElementById('templateGuide').classList.add('show');
        document.getElementById('guideTitle').textContent = '🎮 模拟模式';
        document.getElementById('guideText').innerHTML = '单指拖动 · 双指缩放 · 双指旋转<br>点击 📸 捕获模板开始体验';

        initCanvases();
        initSimBackground();
        startRenderLoop();
        showToast('模拟模式已启动');
    }, 500);
}

function initSimBackground() {
    const container = document.getElementById('videoContainer');
    container.style.background = 'linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)';

    const grid = document.createElement('div');
    grid.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;background-image:linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);background-size:40px 40px;pointer-events:none;';
    container.appendChild(grid);

    document.body.addEventListener('touchstart', handleTouchStart, { passive: false });
    document.body.addEventListener('touchmove', handleTouchMove, { passive: false });
    document.body.addEventListener('touchend', handleTouchEnd, { passive: false });
}

// ==================== 触摸交互处理 ====================
function handleTouchStart(e) {
    if (!isSimMode || !isTracking) return;
    e.preventDefault();

    if (e.touches.length === 1) {
        lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY, type: 'drag' };
    } else if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        lastTouch = {
            dist: Math.hypot(dx, dy),
            angle: Math.atan2(dy, dx),
            type: 'pinch'
        };
        lastPinchDist = lastTouch.dist;
        lastPinchAngle = lastTouch.angle;
    }
}

function handleTouchMove(e) {
    if (!isSimMode || !isTracking) return;
    e.preventDefault();
    if (!lastTouch) return;

    if (lastTouch.type === 'drag' && e.touches.length === 1) {
        const dx = e.touches[0].clientX - lastTouch.x;
        const dy = e.touches[0].clientY - lastTouch.y;
        simModelOffset.x += dx;
        simModelOffset.y += dy;
        lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY, type: 'drag' };
    } else if (lastTouch.type === 'pinch' && e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.hypot(dx, dy);
        const angle = Math.atan2(dy, dx);

        if (lastPinchDist > 0) {
            simModelScale *= dist / lastPinchDist;
            simModelAngle += (angle - lastPinchAngle) * 180 / Math.PI;
        }
        lastPinchDist = dist;
        lastPinchAngle = angle;
    }
}

function handleTouchEnd(e) {
    if (!isSimMode) return;
    lastTouch = null;
    lastPinchDist = 0;
    lastPinchAngle = 0;
}

// ==================== 真实模式启动（安卓优化） ====================
async function startApp() {
    if (!cvReady) {
        showToast('OpenCV 加载中，请稍候...');
        return;
    }

    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('simBtn').style.display = 'none';
    document.getElementById('cvLoading').style.display = 'flex';

    try {
        await initCamera();
        initCanvases();
        initOpenCV();

        document.getElementById('splash').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('main').style.display = 'block';
            document.getElementById('templateGuide').classList.add('show');
            document.getElementById('cameraSwitch').style.display = 'flex';
            startRenderLoop();
            showToast('摄像头已启动，请将零件对准摄像头');
        }, 500);
    } catch (err) {
        console.error('Camera failed:', err);
        document.getElementById('cvLoading').style.display = 'none';
        showToast('摄像头启动失败: ' + err.message);
        setTimeout(() => {
            showToast('自动切换到模拟模式');
            startSimMode();
        }, 2000);
    }
}

async function initCamera() {
    video = document.getElementById('video');

    // 安卓优化：先尝试获取后置摄像头
    const constraints = {
        video: {
            facingMode: 'environment',
            width: { ideal: 1280 },
            height: { ideal: 720 }
        }
    };

    try {
        stream = await navigator.mediaDevices.getUserMedia(constraints);
    } catch (err) {
        // 如果后置失败，尝试任何可用摄像头
        console.log('后置摄像头失败，尝试默认摄像头');
        stream = await navigator.mediaDevices.getUserMedia({ video: true });
    }

    video.srcObject = stream;
    await video.play();

    // 等待视频尺寸就绪
    await new Promise(resolve => {
        if (video.videoWidth > 0) resolve();
        else {
            video.onloadedmetadata = () => resolve();
            setTimeout(resolve, 3000); // 超时保护
        }
    });
}

function initCanvases() {
    canvas = document.getElementById('arCanvas');
    ctx = canvas.getContext('2d');
    resizeCanvas(canvas);

    processCanvas = document.getElementById('processCanvas');
    pCtx = processCanvas.getContext('2d');
    processCanvas.width = video && video.videoWidth ? video.videoWidth : 640;
    processCanvas.height = video && video.videoHeight ? video.videoHeight : 480;

    featureCanvas = document.getElementById('featureOverlay');
    fCtx = featureCanvas.getContext('2d');
    resizeCanvas(featureCanvas);

    window.addEventListener('resize', () => { resizeCanvas(canvas); resizeCanvas(featureCanvas); });
}

function resizeCanvas(c) {
    c.width = window.innerWidth;
    c.height = window.innerHeight;
}

function initOpenCV() {
    if (!cv || isSimMode) return;
    orb = new cv.ORB(5000, 1.2, 8, 31, 0, 2, cv.ORB_HARRIS_SCORE, 31, 20);
    bfMatcher = new cv.BFMatcher(cv.NORM_HAMMING, true);
}

// ==================== 模板捕获 ====================
function captureTemplate() {
    if (isSimMode) {
        trackState = 'tracking';
        isTracking = true;
        document.getElementById('templateGuide').classList.remove('show');
        document.getElementById('qualityBar').classList.add('show');
        updateQualityBar(85);
        updateStatusBadge('sim', '🎮 模拟追踪');
        showToast('模拟模板已捕获！拖动/缩放/旋转模型');

        currentTransform = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            scale: 1,
            angle: 0
        };

        document.getElementById('rStatus').textContent = '模拟追踪';
        document.getElementById('rMatches').textContent = '128';
        document.getElementById('rQuality').textContent = '优秀';
        document.getElementById('rX').textContent = '0.0px';
        document.getElementById('rY').textContent = '0.0px';
        document.getElementById('rScale').textContent = '1.00x';
        document.getElementById('rAngle').textContent = '0.0°';
        document.getElementById('rResult').textContent = '合格';
        return;
    }

    if (!cvReady || !video || !video.readyState) {
        showToast('摄像头未就绪');
        return;
    }

    try {
        const src = cv.imread(video);
        const gray = new cv.Mat();
        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

        templateKeypoints = new cv.KeyPointVector();
        templateDescriptors = new cv.Mat();
        orb.detectAndCompute(gray, new cv.Mat(), templateKeypoints, templateDescriptors);

        const kpCount = templateKeypoints.size();
        if (kpCount < 50) {
            showToast('特征点不足(' + kpCount + ')，请调整光线或对准零件');
            gray.delete(); src.delete();
            return;
        }

        templateImage = src.clone();
        templateCorners = new cv.Mat(4, 1, cv.CV_32FC2);
        templateCorners.data32F[0] = 0; templateCorners.data32F[1] = 0;
        templateCorners.data32F[2] = src.cols; templateCorners.data32F[3] = 0;
        templateCorners.data32F[4] = src.cols; templateCorners.data32F[5] = src.rows;
        templateCorners.data32F[6] = 0; templateCorners.data32F[7] = src.rows;

        gray.delete();

        trackState = 'tracking';
        isTracking = true;
        document.getElementById('templateGuide').classList.remove('show');
        document.getElementById('qualityBar').classList.add('show');
        updateStatusBadge('tracking', '● 追踪中');
        showToast('模板已捕获！' + kpCount + ' 个特征点');

        document.getElementById('rStatus').textContent = '追踪中';
        document.getElementById('rMatches').textContent = kpCount;
    } catch (err) {
        showToast('模板捕获失败: ' + err.message);
    }
}

// ==================== 实时追踪核心 ====================
function processTracking() {
    if (isSimMode) {
        currentTransform = {
            x: canvas.width / 2 + simModelOffset.x,
            y: canvas.height / 2 + simModelOffset.y,
            scale: simModelScale,
            angle: simModelAngle
        };
        matchQuality = 85;

        document.getElementById('rX').textContent = (simModelOffset.x / 10).toFixed(1) + 'px';
        document.getElementById('rY').textContent = (simModelOffset.y / 10).toFixed(1) + 'px';
        document.getElementById('rScale').textContent = simModelScale.toFixed(2) + 'x';
        document.getElementById('rAngle').textContent = simModelAngle.toFixed(1) + '°';
        document.getElementById('rQuality').textContent = '优秀';
        document.getElementById('rResult').textContent = '合格';
        return;
    }

    if (!isTracking || !templateKeypoints || !templateDescriptors) return;

    try {
        const src = cv.imread(video);
        const gray = new cv.Mat();
        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

        const keypoints2 = new cv.KeyPointVector();
        const descriptors2 = new cv.Mat();
        orb.detectAndCompute(gray, new cv.Mat(), keypoints2, descriptors2);

        if (keypoints2.size() < 10) {
            gray.delete(); descriptors2.delete(); keypoints2.delete(); src.delete();
            handleLostTracking();
            return;
        }

        const matches = new cv.DMatchVector();
        bfMatcher.match(templateDescriptors, descriptors2, matches);

        const goodMatches = new cv.DMatchVector();
        let minDist = 100;
        for (let i = 0; i < matches.size(); i++) {
            const dist = matches.get(i).distance;
            if (dist < minDist) minDist = dist;
        }

        const threshold = Math.max(minDist * 2.5, 30);
        for (let i = 0; i < matches.size(); i++) {
            if (matches.get(i).distance < threshold) goodMatches.push_back(matches.get(i));
        }

        const matchCount = goodMatches.size();
        document.getElementById('matchCount').textContent = '匹配点: ' + matchCount;
        document.getElementById('rMatches').textContent = matchCount;

        matchQuality = Math.min(matchCount / 20 * 100, 100);
        updateQualityBar(matchQuality);

        if (matchCount < 8) {
            gray.delete(); descriptors2.delete(); keypoints2.delete();
            matches.delete(); goodMatches.delete(); src.delete();
            handleLostTracking();
            return;
        }

        const srcPoints = new cv.Mat(matchCount, 1, cv.CV_32FC2);
        const dstPoints = new cv.Mat(matchCount, 1, cv.CV_32FC2);

        for (let i = 0; i < matchCount; i++) {
            const match = goodMatches.get(i);
            const kp1 = templateKeypoints.get(match.queryIdx);
            const kp2 = keypoints2.get(match.trainIdx);
            srcPoints.data32F[i * 2] = kp1.pt.x;
            srcPoints.data32F[i * 2 + 1] = kp1.pt.y;
            dstPoints.data32F[i * 2] = kp2.pt.x;
            dstPoints.data32F[i * 2 + 1] = kp2.pt.y;
        }

        homographyMatrix = cv.findHomography(srcPoints, dstPoints, cv.RANSAC, 5.0);

        const transformedCorners = new cv.Mat();
        cv.perspectiveTransform(templateCorners, transformedCorners, homographyMatrix);

        extractTransformParams(homographyMatrix, src.cols, src.rows);

        if (showFeatures) drawFeatureMatches(src, keypoints2, goodMatches, transformedCorners);

        gray.delete(); descriptors2.delete(); keypoints2.delete();
        matches.delete(); goodMatches.delete();
        srcPoints.delete(); dstPoints.delete();
        transformedCorners.delete();
        src.delete();

        if (trackState === 'lost') {
            trackState = 'tracking';
            updateStatusBadge('tracking', '● 追踪中');
            showToast('追踪恢复');
        }
    } catch (err) {
        handleLostTracking();
    }
}

function extractTransformParams(H, imgWidth, imgHeight) {
    const h = H.data64F;
    const cx = imgWidth / 2, cy = imgHeight / 2;
    const denom = h[6] * cx + h[7] * cy + h[8];
    const newX = (h[0] * cx + h[1] * cy + h[2]) / denom;
    const newY = (h[3] * cx + h[4] * cy + h[5]) / denom;
    const scaleX = Math.sqrt(h[0] * h[0] + h[3] * h[3]);
    const scaleY = Math.sqrt(h[1] * h[1] + h[4] * h[4]);
    const scale = (scaleX + scaleY) / 2;
    const angle = Math.atan2(h[3], h[0]) * 180 / Math.PI;

    const sx = canvas.width / imgWidth, sy = canvas.height / imgHeight;
    currentTransform = {
        x: newX * sx, y: newY * sy,
        scale: scale * ((sx + sy) / 2), angle: angle
    };

    const dx = ((newX - cx) / imgWidth * 100).toFixed(1);
    const dy = ((newY - cy) / imgHeight * 100).toFixed(1);

    document.getElementById('rX').textContent = (dx > 0 ? '+' : '') + dx + '%';
    document.getElementById('rX').className = 'value ' + (Math.abs(dx) < 5 ? 'ok' : Math.abs(dx) < 10 ? 'warn' : 'nok');
    document.getElementById('rY').textContent = (dy > 0 ? '+' : '') + dy + '%';
    document.getElementById('rY').className = 'value ' + (Math.abs(dy) < 5 ? 'ok' : Math.abs(dy) < 10 ? 'warn' : 'nok');
    document.getElementById('rScale').textContent = scale.toFixed(2) + 'x';
    document.getElementById('rAngle').textContent = angle.toFixed(1) + '°';

    const q = matchQuality > 70 ? '优秀' : matchQuality > 40 ? '良好' : '一般';
    document.getElementById('rQuality').textContent = q;
    document.getElementById('rQuality').className = 'value ' + (matchQuality > 70 ? 'ok' : matchQuality > 40 ? 'warn' : 'nok');

    const r = Math.max(Math.abs(parseFloat(dx)), Math.abs(parseFloat(dy))) < 5 ? '合格' : '需复核';
    document.getElementById('rResult').textContent = r;
    document.getElementById('rResult').className = 'value ' + (r === '合格' ? 'ok' : 'warn');
}

function handleLostTracking() {
    if (trackState !== 'lost') {
        trackState = 'lost';
        updateStatusBadge('lost', '● 追踪丢失');
        document.getElementById('rStatus').textContent = '丢失';
        document.getElementById('rStatus').className = 'value nok';
    }
    matchQuality = Math.max(0, matchQuality - 5);
    updateQualityBar(matchQuality);
}

function updateQualityBar(q) {
    const fill = document.getElementById('qualityFill');
    fill.style.width = q + '%';
    fill.className = q > 70 ? 'good' : q > 40 ? 'medium' : 'poor';
}

function updateStatusBadge(state, text) {
    const badge = document.getElementById('statusBadge');
    badge.className = state;
    badge.innerHTML = '<span>●</span> ' + text.replace('● ', '');
}

function drawFeatureMatches(src, keypoints2, goodMatches, transformedCorners) {
    fCtx.clearRect(0, 0, featureCanvas.width, featureCanvas.height);
    const sx = featureCanvas.width / src.cols, sy = featureCanvas.height / src.rows;

    for (let i = 0; i < Math.min(goodMatches.size(), 30); i++) {
        const kp2 = keypoints2.get(goodMatches.get(i).trainIdx);
        fCtx.beginPath();
        fCtx.strokeStyle = 'rgba(0, 255, 136, 0.4)';
        fCtx.lineWidth = 1;
        fCtx.moveTo(kp2.pt.x * sx, kp2.pt.y * sy);
        const a = Math.random() * Math.PI * 2;
        fCtx.lineTo(kp2.pt.x * sx + Math.cos(a) * 20, kp2.pt.y * sy + Math.sin(a) * 20);
        fCtx.stroke();
        fCtx.beginPath();
        fCtx.arc(kp2.pt.x * sx, kp2.pt.y * sy, 3, 0, Math.PI * 2);
        fCtx.fillStyle = 'rgba(0, 255, 136, 0.6)';
        fCtx.fill();
    }

    if (transformedCorners && transformedCorners.rows >= 4) {
        const c = transformedCorners.data32F;
        fCtx.beginPath();
        fCtx.strokeStyle = '#667eea';
        fCtx.lineWidth = 3;
        fCtx.moveTo(c[0] * sx, c[1] * sy);
        for (let i = 2; i < 8; i += 2) fCtx.lineTo(c[i] * sx, c[i + 1] * sy);
        fCtx.closePath(); fCtx.stroke();
        for (let i = 0; i < 8; i += 2) {
            fCtx.beginPath();
            fCtx.arc(c[i] * sx, c[i + 1] * sy, 5, 0, Math.PI * 2);
            fCtx.fillStyle = '#667eea'; fCtx.fill();
        }
    }
}

// ==================== AR渲染 ====================
function renderAR() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!isTracking || trackState === 'lost') {
        if (trackState === 'lost') {
            ctx.fillStyle = 'rgba(255, 100, 0, 0.8)';
            ctx.font = 'bold 16px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('⚠️ 追踪丢失 - 请重新对准零件', canvas.width / 2, canvas.height / 2);
        }
        return;
    }

    const { x, y, scale, angle } = currentTransform;
    const s = scale * 0.5;
    const w = modelConfig.width * s / 10;
    const h = modelConfig.height * s / 10;

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle * Math.PI / 180);

    ctx.strokeStyle = modelConfig.color;
    ctx.lineWidth = 2.5;
    ctx.setLineDash([8, 6]);
    ctx.strokeRect(-w/2, -h/2, w, h);

    ctx.fillStyle = modelConfig.color;
    [[-w/2,-h/2],[w/2,-h/2],[w/2,h/2],[-w/2,h/2]].forEach(([cx, cy]) => {
        ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI * 2); ctx.fill();
    });

    const checkPoints = [
        { x: -0.35, y: -0.35 }, { x: 0.35, y: -0.35 }, { x: 0, y: 0 },
        { x: -0.35, y: 0.35 }, { x: 0.35, y: 0.35 }
    ];

    checkPoints.forEach((pt, i) => {
        const px = pt.x * w, py = pt.y * h;
        const isOk = Math.random() > 0.2;
        const color = isOk ? '#00ff88' : '#ff4757';

        ctx.beginPath();
        ctx.arc(px, py, 10, 0, Math.PI * 2);
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.setLineDash([]);
        ctx.stroke();

        ctx.fillStyle = color;
        ctx.font = 'bold 10px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(isOk ? '✓' : '✗', px, py);

        ctx.fillStyle = 'white';
        ctx.font = '9px sans-serif';
        ctx.fillText('P' + (i+1), px, py - 16);
    });

    ctx.fillStyle = 'white';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(modelConfig.name, 0, -h/2 - 18);
    ctx.font = '11px sans-serif';
    ctx.fillStyle = '#a0a0c0';
    ctx.fillText(`${modelConfig.width}×${modelConfig.height}mm | 公差±${modelConfig.tolerance}mm`, 0, -h/2 - 5);

    ctx.restore();

    // 偏差面板
    const px = 12, py = canvas.height / 2 - 80;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(px, py, 110, 100);
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    ctx.strokeRect(px, py, 110, 100);
    ctx.fillStyle = '#00ff88';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('偏差', px + 55, py + 22);
    ctx.fillStyle = 'white';
    ctx.font = '20px sans-serif';
    ctx.fillText('<1mm', px + 55, py + 48);
    ctx.fillStyle = '#a0a0c0';
    ctx.font = '10px sans-serif';
    ctx.fillText('X: ' + document.getElementById('rX').textContent, px + 55, py + 68);
    ctx.fillText('Y: ' + document.getElementById('rY').textContent, px + 55, py + 82);
    ctx.fillText('Q: ' + matchQuality.toFixed(0) + '%', px + 55, py + 96);
}

// ==================== 渲染循环 ====================
function startRenderLoop() {
    function loop() {
        updateFPS();
        if (isTracking) processTracking();
        renderAR();
        animationId = requestAnimationFrame(loop);
    }
    loop();
}

function updateFPS() {
    frameCount++;
    const now = performance.now();
    if (now - lastTime >= 1000) {
        document.getElementById('fpsDisplay').textContent = frameCount + ' FPS';
        frameCount = 0;
        lastTime = now;
    }
}

function toggleFeatures() {
    showFeatures = !showFeatures;
    document.getElementById('featBtn').classList.toggle('active', showFeatures);
    document.getElementById('featureOverlay').classList.toggle('show', showFeatures);
    showToast(showFeatures ? '显示特征点' : '隐藏特征点');
    if (!showFeatures) fCtx.clearRect(0, 0, featureCanvas.width, featureCanvas.height);
}

function toggleReport() {
    document.getElementById('reportPanel').classList.toggle('show');
}

function resetTracking() {
    isTracking = false;
    trackState = 'init';
    matchQuality = 0;

    if (templateKeypoints) { templateKeypoints.delete(); templateKeypoints = null; }
    if (templateDescriptors) { templateDescriptors.delete(); templateDescriptors = null; }
    if (templateImage) { templateImage.delete(); templateImage = null; }
    if (templateCorners) { templateCorners.delete(); templateCorners = null; }
    if (homographyMatrix) { homographyMatrix.delete(); homographyMatrix = null; }

    simModelOffset = { x: 0, y: 0 };
    simModelScale = 1;
    simModelAngle = 0;

    document.getElementById('templateGuide').classList.add('show');
    document.getElementById('qualityBar').classList.remove('show');
    document.getElementById('featureOverlay').classList.remove('show');
    document.getElementById('featBtn').classList.remove('active');
    showFeatures = false;
    updateStatusBadge('init', '等待模板');

    document.getElementById('rStatus').textContent = '等待模板';
    document.getElementById('rStatus').className = 'value ok';
    ['rMatches','rQuality','rX','rY','rScale','rAngle','rResult'].forEach(id => {
        document.getElementById(id).textContent = '--';
        document.getElementById(id).className = 'value ok';
    });
    showToast('已重置');
}

function capturePhoto() {
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = video && video.videoWidth ? video.videoWidth : canvas.width;
    tempCanvas.height = video && video.videoHeight ? video.videoHeight : canvas.height;
    const tctx = tempCanvas.getContext('2d');

    if (isSimMode) {
        tctx.fillStyle = '#0a0a0a';
        tctx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
        tctx.strokeStyle = 'rgba(255,255,255,0.03)';
        for (let x = 0; x < tempCanvas.width; x += 40) { tctx.beginPath(); tctx.moveTo(x, 0); tctx.lineTo(x, tempCanvas.height); tctx.stroke(); }
        for (let y = 0; y < tempCanvas.height; y += 40) { tctx.beginPath(); tctx.moveTo(0, y); tctx.lineTo(tempCanvas.width, y); tctx.stroke(); }
    } else {
        tctx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
    }

    if (isTracking && trackState === 'tracking') {
        const sx = tempCanvas.width / canvas.width, sy = tempCanvas.height / canvas.height;
        tctx.save();
        tctx.scale(sx, sy);
        const { x, y, scale, angle } = currentTransform;
        const s = scale * 0.5;
        const w = modelConfig.width * s / 10;
        const h = modelConfig.height * s / 10;
        tctx.translate(x, y);
        tctx.rotate(angle * Math.PI / 180);
        tctx.strokeStyle = modelConfig.color;
        tctx.lineWidth = 3;
        tctx.setLineDash([10, 8]);
        tctx.strokeRect(-w/2, -h/2, w, h);
        tctx.restore();
    }

    tctx.fillStyle = 'rgba(0,0,0,0.7)';
    tctx.fillRect(10, 10, 320, 90);
    tctx.fillStyle = 'white';
    tctx.font = 'bold 18px sans-serif';
    tctx.textAlign = 'left';
    tctx.fillText('AR视觉检测报告', 20, 35);
    tctx.font = '13px sans-serif';
    tctx.fillStyle = '#a0a0c0';
    tctx.fillText('模型: ' + modelConfig.name, 20, 55);
    tctx.fillText('时间: ' + new Date().toLocaleString('zh-CN'), 20, 75);
    tctx.fillText('状态: ' + (isSimMode ? '模拟模式' : trackState === 'tracking' ? '追踪中' : '未追踪'), 20, 95);

    const img = document.getElementById('previewImg');
    img.src = tempCanvas.toDataURL('image/jpeg', 0.92);
    document.getElementById('photoPreview').classList.add('show');
    showToast('照片已捕获');
}

function savePhoto() {
    const link = document.createElement('a');
    link.download = 'AR检测报告_' + Date.now() + '.jpg';
    link.href = document.getElementById('previewImg').src;
    link.click();
    showToast('报告已保存');
    closePreview();
}

function closePreview() {
    document.getElementById('photoPreview').classList.remove('show');
}

function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
}

document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
</script>
